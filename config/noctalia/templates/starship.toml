"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](m_primary)\
$os\
$username\
[Ņé░](bg:m_secondary fg:m_primary)\
$directory\
[Ņé░](fg:m_secondary bg:m_primary_container)\
$git_branch\
$git_status\
[Ņé░](fg:m_primary_container bg:m_tertiary)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:m_tertiary bg:m_tertiary_container)\
$docker_context\
$conda\
$pixi\
[Ņé░](fg:m_tertiary_container bg:m_surface_variant)\
$time\
[Ņé┤ ](fg:m_surface_variant)\
$line_break$character"""

palette = 'noctalia'

[palettes.noctalia]
m_surface = "{{colors.surface.dark.hex}}"
m_on_surface = "{{colors.on_surface.dark.hex}}"
m_surface_variant = "{{colors.surface_variant.dark.hex}}"
m_on_surface_variant = "{{colors.on_surface_variant.dark.hex}}"
m_primary = "{{colors.primary.dark.hex}}"
m_on_primary = "{{colors.on_primary.dark.hex}}"
m_primary_container = "{{colors.primary_container.dark.hex}}"
m_secondary = "{{colors.secondary.dark.hex}}"
m_on_secondary = "{{colors.on_secondary.dark.hex}}"
m_tertiary = "{{colors.tertiary.dark.hex}}"
m_on_tertiary = "{{colors.on_tertiary.dark.hex}}"
m_tertiary_container = "{{colors.tertiary_container.dark.hex}}"
m_on_tertiary_container = "{{colors.on_tertiary_container.dark.hex}}"
m_success = "{{colors.secondary.dark.hex}}"
m_error = "{{colors.error.dark.hex}}"
m_warning = "{{colors.tertiary.dark.hex}}"
m_outline = "{{colors.outline.dark.hex}}"

[os]
disabled = false
style = "bg:m_primary fg:m_on_primary"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
AOSC = "’īü"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "’ī¬"

[username]
show_always = true
style_user = "bg:m_primary fg:m_on_primary"
style_root = "bg:m_error fg:m_on_primary"
format = '[ $user ]($style)'

[directory]
style = "bg:m_secondary fg:m_on_secondary"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:m_primary_container"
format = '[[ $symbol $branch ](fg:m_on_surface bg:m_primary_container)]($style)'

[git_status]
style = "bg:m_primary_container"
format = '[[($all_status$ahead_behind )](fg:m_on_surface bg:m_primary_container)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[c]
symbol = "Ņś× "
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[cpp]
symbol = "ŅśØ "
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[php]
symbol = "Ņśł"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[java]
symbol = "Ņē¢"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[python]
symbol = "Ņśå"
style = "bg:m_tertiary"
format = '[[ $symbol( $version) ](fg:m_on_tertiary bg:m_tertiary)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:m_tertiary_container"
format = '[[ $symbol( $context) ](fg:m_on_tertiary_container bg:m_tertiary_container)]($style)'

[conda]
style = "bg:m_tertiary_container"
format = '[[ $symbol( $environment) ](fg:m_on_tertiary_container bg:m_tertiary_container)]($style)'

[pixi]
style = "bg:m_tertiary_container"
format = '[[ $symbol( $version)( $environment) ](fg:m_on_tertiary_container bg:m_tertiary_container)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:m_surface_variant"
format = '[[ ’É║ $time ](fg:m_on_surface_variant bg:m_surface_variant)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[’É▓](bold fg:m_success)'
error_symbol = '[’É▓](bold fg:m_error)'
vimcmd_symbol = '[’É┤](bold fg:m_success)'
vimcmd_replace_one_symbol = '[’É┤](bold fg:m_tertiary)'
vimcmd_replace_symbol = '[’É┤](bold fg:m_tertiary)'
vimcmd_visual_symbol = '[’É┤](bold fg:m_warning)'
